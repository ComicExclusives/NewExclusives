<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Upcoming Retailer Exclusive Comics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- External CSS -->
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>

  <h1>Upcoming Retailer Exclusives ✨</h1>
  <div class="updated" id="lastUpdated"></div>

  <!-- Publisher Filters -->
  <div class="filters-group">
    <div class="filters-label">Publisher</div>
    <div class="filters" id="publisherFilters"></div>
  </div>

  <!-- Series Filters -->
  <div class="filters-group">
    <div class="filters-label">Series</div>
    <div class="filters" id="seriesFilters"></div>
  </div>

  <!-- List -->
  <div id="list">Loading…</div>

  <script>
    /* ---------- Utilities ---------- */
    function escapeHtml(v) {
      return String(v ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function getPublisherClass(publisher) {
      if (!publisher) return 'default';
      const n = publisher.toLowerCase();
      if (n.includes('marvel')) return 'marvel';
      if (n.includes('dc')) return 'dc';
      if (n.includes('image')) return 'image';
      if (n.includes('boom')) return 'boom';
      return 'default';
    }

    function getRetailersArray(item) {
      if (Array.isArray(item.retailers)) return item.retailers;
      if (item.retailer) return [item.retailer]; // backward compatibility
      return [];
    }

    function renderRetailers(item) {
      const retailers = getRetailersArray(item);
      if (!retailers.length) return 'Retailer: <strong>Unknown</strong>';

      const html = retailers.map(r => {
        const name = escapeHtml(r.name || 'Unknown');
        if (r.website) {
          return `<a href="${escapeHtml(r.website)}" target="_blank" rel="noopener">${name}</a>`;
        }
        return name;
      }).join(', ');

      return `Retailer${retailers.length > 1 ? 's' : ''}: <strong>${html}</strong>`;
    }

    /* ---------- Image ---------- */
    function renderThumbnail(item) {
      if (!item.image) return '';
      return `
        <div class="thumb">
          <img src="${escapeHtml(item.image)}"
               alt="${escapeHtml(item.title)}"
               loading="lazy" />
        </div>
      `;
    }

    function parseReleaseParts(str) {
      // YYYY-M-DD-hh:mmAM/PM
      const m = String(str ?? '').match(
        /^(\d{4})-(\d{1,2})-(\d{1,2})-(\d{1,2}):(\d{2})(AM|PM)$/
      );
      if (!m) return null;

      let [, y, mo, d, h, mi, ap] = m;
      y = +y; mo = +mo; d = +d; h = +h; mi = +mi;

      if (ap === 'PM' && h !== 12) h += 12;
      if (ap === 'AM' && h === 12) h = 0;

      return { y, mo, d, h, mi };
    }


    // Convert ET wall-clock parts to a UTC timestamp (ms), DST-safe.
    function etPartsToUtcMs(parts) {
      const { y, mo, d, h, mi } = parts;

      const utcGuess = Date.UTC(y, mo - 1, d, h, mi, 0);

      const fmt = new Intl.DateTimeFormat('en-US', {
        timeZone: 'America/New_York',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
      });

      function partsFromUtc(ms) {
        const p = fmt.formatToParts(new Date(ms));
        const get = (type) => p.find(x => x.type === type)?.value;
        return {
          y: +get('year'),
          mo: +get('month'),
          d: +get('day'),
          h: +get('hour'),
          mi: +get('minute')
        };
      }

      const shown = partsFromUtc(utcGuess);

      // Compute minute delta between desired ET wall time and what the guess shows in ET.
      const desired = (((y * 12 + mo) * 31 + d) * 24 + h) * 60 + mi;
      const actual  = (((shown.y * 12 + shown.mo) * 31 + shown.d) * 24 + shown.h) * 60 + shown.mi;

      const deltaMinutes = desired - actual;
      return utcGuess + deltaMinutes * 60 * 1000;
    }


        // Convenience: from your releaseDate string → Date object representing the true moment
    function parseReleaseDateAsET(str) {
      const parts = parseReleaseParts(str);
      if (!parts) return null;
      return new Date(etPartsToUtcMs(parts));
    }

    /* ---------- Date handling ---------- */
    function parseReleaseDate(str) {
      const m = String(str ?? '').match(
        /^(\d{4})-(\d{1,2})-(\d{1,2})-(\d{1,2}):(\d{2})(AM|PM)$/
      );
      if (!m) return null;

      let [, y, mo, d, h, mi, p] = m;
      y = +y; mo = +mo - 1; d = +d; h = +h; mi = +mi;

      if (p === 'PM' && h !== 12) h += 12;
      if (p === 'AM' && h === 12) h = 0;

      return new Date(y, mo, d, h, mi, 0);
    }

    function formatReleaseDisplayET(str) {
      const d = parseReleaseDateAsET(str);
      if (!d) return 'TBD';

      // Display in Eastern Time (handles EST/EDT automatically)
      return d.toLocaleString(undefined, {
        timeZone: 'America/New_York',
        month: 'long',
        day: 'numeric',
        hour: 'numeric',
        minute: '2-digit',
        hour12: true
      });
    }

    function formatReleaseDisplayLocal(str) {
      const d = parseReleaseDateAsET(str);
      if (!d) return 'TBD';

      // Display in the viewer's LOCAL timezone (no timeZone option)
      return d.toLocaleString(undefined, {
        month: 'long',
        day: 'numeric',
        hour: 'numeric',
        minute: '2-digit',
        hour12: true
      });
    }

    // Convert "New York local time" parts to a real UTC timestamp (ms)
    // DST-safe because it uses IANA time zone rules.
    function nyPartsToUtcMs(parts) {
      const { y, mo, d, h, mi } = parts;

      // Start with a UTC guess for the same wall-clock time.
      // We'll then find the correct offset by comparing what New York would display.
      const utcGuess = Date.UTC(y, mo - 1, d, h, mi, 0);

      // This formatter tells us what *New York* thinks the wall-clock is at a given UTC instant.
      const fmt = new Intl.DateTimeFormat('en-US', {
        timeZone: 'America/New_York',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
      });

      function partsFromUtc(ms) {
        const p = fmt.formatToParts(new Date(ms));
        const get = (type) => p.find(x => x.type === type)?.value;
        return {
          y: +get('year'),
          mo: +get('month'),
          d: +get('day'),
          h: +get('hour'),
          mi: +get('minute')
        };
      }

      // Compute how far off our guess is, in minutes, then correct the guess.
      const shown = partsFromUtc(utcGuess);

      const desiredTotal = (((y * 12 + mo) * 31 + d) * 24 + h) * 60 + mi;
      const shownTotal   = (((shown.y * 12 + shown.mo) * 31 + shown.d) * 24 + shown.h) * 60 + shown.mi;

      const deltaMinutes = desiredTotal - shownTotal;
      return utcGuess + deltaMinutes * 60 * 1000;
    }

    function formatCountdown(str) {
      const parts = parseReleaseParts(str);
      if (!parts) return '';

      const targetMs = nyPartsToUtcMs(parts);
      const diff = targetMs - Date.now();
      if (diff <= 0) return '';

      const mins = Math.floor(diff / 60000);
      const days = Math.floor(mins / 1440);
      const hours = Math.floor((mins % 1440) / 60);
      const minutes = mins % 60;

      if (days === 0 && hours === 0) return `Releasing in ${minutes} min ⚡`;
      if (days === 0) return `Releasing in ${hours}h ${minutes}m`;
      return `Releasing in ${days}d ${hours}h`;
    }

    function isWithin24HoursET(str) {
      const d = parseReleaseDateAsET(str); // same ET parser you already use
      if (!d) return false;

      const now = Date.now();
      const diffMs = d.getTime() - now;

      return diffMs > 0 && diffMs <= 24 * 60 * 60 * 1000;
    }

    /* ---------- State ---------- */
    let allExclusives = [];
    let activePublisher = 'all';
    let activeSeries = 'all';

    /* ---------- Filters ---------- */
    function unique(list) {
      return [...new Set(list.filter(Boolean))].sort();
    }

    function buildPublisherFilters() {
      const el = document.getElementById('publisherFilters');
      el.innerHTML = '';

      const make = (label, value, cls) => {
        const d = document.createElement('div');
        d.className = `filter-pill ${cls} publisher-pill${activePublisher === value ? ' active' : ''}`;
        d.textContent = label;
        d.onclick = () => setFilter('publisher', value);
        el.appendChild(d);
      };

      make('All', 'all', 'default');
      unique(allExclusives.map(e => e.publisher))
        .forEach(p => make(p, p, getPublisherClass(p)));
    }

    function buildSeriesFilters() {
      const el = document.getElementById('seriesFilters');
      el.innerHTML = '';

      const base = activePublisher === 'all'
        ? allExclusives
        : allExclusives.filter(e => e.publisher === activePublisher);

      const series = unique(base.map(e => e.series));
      if (activeSeries !== 'all' && !series.includes(activeSeries)) {
        activeSeries = 'all';
      }

      const make = (label, value) => {
        const d = document.createElement('div');
        d.className = `filter-pill default series-pill${activeSeries === value ? ' active' : ''}`;
        d.textContent = label;
        d.onclick = () => setFilter('series', value);
        el.appendChild(d);
      };

      make('All', 'all');
      series.forEach(s => make(s, s));
    }

    function setFilter(type, value) {
      if (type === 'publisher') activePublisher = value;
      if (type === 'series') activeSeries = value;
      buildPublisherFilters();
      buildSeriesFilters();
      renderList();
    }

    /* ---------- Render ---------- */
    function renderList() {
      const list = document.getElementById('list');
      list.innerHTML = '';

      const filtered = allExclusives.filter(e =>
        (activePublisher === 'all' || e.publisher === activePublisher) &&
        (activeSeries === 'all' || e.series === activeSeries)
      );

      if (!filtered.length) {
        list.textContent = 'No exclusives match these filters.';
        return;
      }

      filtered.forEach(item => {
        const div = document.createElement('div');
        div.className = 'exclusive';

        if (isWithin24HoursET(item.releaseDate)) {
          div.classList.add('soon');
        }

        const countdown = formatCountdown(item.releaseDate);

        div.innerHTML = `
          <div class="card">
            ${renderThumbnail(item)}
            <div class="card-content">
              <div class="title">
                ${escapeHtml(item.title)} ${item.coverArtist ? ' — Cover by ' + escapeHtml(item.coverArtist) : ''}
                <span class="badge ${getPublisherClass(item.publisher)}">
                  ${escapeHtml(item.publisher)}
                </span>
                  ${isWithin24HoursET(item.releaseDate) ? `<span class="soon-badge">Releases Soon</span>` : ''}
              </div>

              <div class="meta">
                Release Time: ${escapeHtml(formatReleaseDisplayET(item.releaseDate))} ET / ${escapeHtml(formatReleaseDisplayLocal(item.releaseDate))}
              </div>

              ${countdown ? `<div class="meta countdown">${escapeHtml(countdown)}</div>` : ''}

              <div class="retailer">
                ${renderRetailers(item)}
              </div>

              ${item.notes ? `<div class="meta">Notes: ${escapeHtml(item.notes)}</div>` : ''}
            </div>
          </div>
        `;

        list.appendChild(div);
      });
    }

    /* ---------- Load ---------- */
    fetch('./data/exclusives.json')
      .then(r => r.json())
      .then(data => {
        document.getElementById('lastUpdated').textContent =
          `Last updated: ${data.meta?.lastUpdated ?? ''}`;

        allExclusives = (data.exclusives ?? []).sort((a, b) => {
          const da = parseReleaseDate(a.releaseDate);
          const db = parseReleaseDate(b.releaseDate);
          if (!da && !db) return 0;
          if (!da) return 1;
          if (!db) return -1;
          return da - db;
        });

        buildPublisherFilters();
        buildSeriesFilters();
        renderList();
      })
      .catch(() => {
        document.getElementById('list').textContent = 'Failed to load exclusives.';
      });

    setInterval(renderList, 60000);
  </script>

</body>
</html>
