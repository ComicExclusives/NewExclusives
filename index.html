<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Upcoming Retailer Exclusive Comics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- External CSS -->
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>

  <h1>Upcoming Retailer Exclusives ✨</h1>
  <div class="updated" id="lastUpdated"></div>

  <!-- Publisher Filters -->
  <div class="filters-group">
    <div class="filters-label">Publisher</div>
    <div class="filters" id="publisherFilters"></div>
  </div>

  <!-- Series Filters -->
  <div class="filters-group">
    <div class="filters-label">Series</div>
    <div class="filters" id="seriesFilters"></div>
  </div>

  <!-- List -->
  <div id="list">Loading…</div>

  <script>
    /* ---------------- Publisher badge class ---------------- */
    function getPublisherClass(publisher) {
      if (!publisher) return 'default';
      const name = publisher.toLowerCase();
      if (name.includes('marvel')) return 'marvel';
      if (name.includes('dc')) return 'dc';
      if (name.includes('image')) return 'image';
      if (name.includes('boom')) return 'boom';
      return 'default';
    }

    /* ---------------- Release date parsing ---------------- */
    // Expected format: YYYY-M-DD-hh:mmAM/PM
    // Example: 2026-4-10-9:30AM
    function parseReleaseDate(dateStr) {
      const match = dateStr?.match(
        /^(\d{4})-(\d{1,2})-(\d{1,2})-(\d{1,2}):(\d{2})(AM|PM)$/
      );
      if (!match) return null;

      let [, year, month, day, hour, minute, period] = match;

      year = Number(year);
      month = Number(month) - 1;
      day = Number(day);
      hour = Number(hour);
      minute = Number(minute);

      if (period === 'PM' && hour !== 12) hour += 12;
      if (period === 'AM' && hour === 12) hour = 0;

      return new Date(year, month, day, hour, minute, 0);
    }

    function formatReleaseDateDisplay(dateStr) {
      const d = parseReleaseDate(dateStr);
      if (!d) return 'TBD';

      return d.toLocaleString(undefined, {
        month: 'long',
        day: 'numeric',
        hour: 'numeric',
        minute: '2-digit',
        hour12: true
      });
    }

    function formatCountdown(dateStr) {
      const release = parseReleaseDate(dateStr);
      if (!release) return ''; // no countdown if date is invalid/tbd

      const now = new Date();
      const diffMs = release - now;

      if (diffMs <= 0) return ''; // ✅ past date => hide "Releasing" field

      const totalMinutes = Math.floor(diffMs / (1000 * 60));
      const days = Math.floor(totalMinutes / (60 * 24));
      const hours = Math.floor((totalMinutes % (60 * 24)) / 60);
      const minutes = totalMinutes % 60;

      if (days === 0 && hours === 0) return `Releasing in ${minutes} min ⚡`;
      if (days === 0) return `Releasing in ${hours}h ${minutes}m`;

      return `Releasing in ${days}d ${hours}h`;
    }

    /* ---------------- State ---------------- */
    let allExclusives = [];
    let activePublisher = 'all';
    let activeSeries = 'all';

    /* ---------------- Rendering ---------------- */
    function renderList() {
      const list = document.getElementById('list');
      list.innerHTML = '';

      const filtered = allExclusives.filter(item => {
        const publisherMatch =
          activePublisher === 'all' || item.publisher === activePublisher;
        const seriesMatch =
          activeSeries === 'all' || item.series === activeSeries;
        return publisherMatch && seriesMatch;
      });

      if (filtered.length === 0) {
        list.textContent = 'No exclusives match these filters.';
        return;
      }

      filtered.forEach(item => {
        const div = document.createElement('div');
        div.className = 'exclusive';

        const countdownText = formatCountdown(item.releaseDate);

        div.innerHTML = `
          <div class="title">
            ${item.title}
            <span class="badge ${getPublisherClass(item.publisher)}">
              ${item.publisher}
            </span>
          </div>

          <div class="meta">
            Release: ${formatReleaseDateDisplay(item.releaseDate)}
          </div>

          ${countdownText ? `<div class="meta countdown">${countdownText}</div>` : ''}

          <div class="retailer">
            Retailer: <strong>${item.retailer.name}</strong>
          </div>

          ${item.notes ? `<div class="meta">Notes: ${item.notes}</div>` : ''}
        `;

        list.appendChild(div);
      });
    }

    function setActiveFilter(type, value) {
      if (type === 'publisher') activePublisher = value;
      if (type === 'series') activeSeries = value;

      document
        .querySelectorAll(`.${type}-pill`)
        .forEach(pill => {
          pill.classList.toggle('active', pill.dataset.value === value);
        });

      renderList();
    }

    /* ---------------- Data load ---------------- */
    fetch('./data/exclusives.json')
      .then(res => res.json())
      .then(data => {
        document.getElementById('lastUpdated').textContent =
          `Last updated: ${data.meta.lastUpdated}`;

        allExclusives = data.exclusives
          .filter(item => item.status === 'announced')
          .sort(
            (a, b) =>
              parseReleaseDate(a.releaseDate) -
              parseReleaseDate(b.releaseDate)
          );

        /* Publisher pills */
        const publisherContainer = document.getElementById('publisherFilters');

        const allPublisher = document.createElement('div');
        allPublisher.className =
          'filter-pill default publisher-pill active';
        allPublisher.textContent = 'All';
        allPublisher.dataset.value = 'all';
        allPublisher.onclick = () =>
          setActiveFilter('publisher', 'all');
        publisherContainer.appendChild(allPublisher);

        [...new Set(allExclusives.map(i => i.publisher))].forEach(pub => {
          const pill = document.createElement('div');
          pill.className =
            `filter-pill ${getPublisherClass(pub)} publisher-pill`;
          pill.textContent = pub;
          pill.dataset.value = pub;
          pill.onclick = () =>
            setActiveFilter('publisher', pub);
          publisherContainer.appendChild(pill);
        });

        /* Series pills */
        const seriesContainer = document.getElementById('seriesFilters');

        const allSeries = document.createElement('div');
        allSeries.className =
          'filter-pill default series-pill active';
        allSeries.textContent = 'All';
        allSeries.dataset.value = 'all';
        allSeries.onclick = () =>
          setActiveFilter('series', 'all');
        seriesContainer.appendChild(allSeries);

        [...new Set(allExclusives.map(i => i.series))].forEach(series => {
          const pill = document.createElement('div');
          pill.className = 'filter-pill default series-pill';
          pill.textContent = series;
          pill.dataset.value = series;
          pill.onclick = () =>
            setActiveFilter('series', series);
          seriesContainer.appendChild(pill);
        });

        renderList();
      })
      .catch(err => {
        document.getElementById('list').textContent =
          'Failed to load exclusives.';
        console.error(err);
      });

    /* Optional: refresh countdown every minute */
    setInterval(renderList, 60 * 1000);
  </script>

</body>
</html>
