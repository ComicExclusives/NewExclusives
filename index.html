<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Upcoming Retailer Exclusives</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <header>
    <h1>Upcoming Retailer Exclusives ✨</h1>
  </header>
  <main>
    <div id="list" class="grid">Loading…</div>
  </main>

  <script>
    (async function(){
      const container = document.getElementById('list');
      function escapeHtml(s){ return String(s||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;'); }
      try{
        const res = await fetch('./data/exclusives.json');
        if(!res.ok) throw new Error('Network error');
        const json = await res.json();
        const items = Array.isArray(json) ? json : (json.exclusives || []);
        if(!items.length){ container.textContent = 'No exclusives found.'; return; }
        container.innerHTML = '';
        items.forEach(item => {
          const img = item.image_url || item.image || '';
          const title = item.title || 'Untitled';
          const release = item.release_date || item.releaseDate || 'TBD';
          const retailer = item.retailer || (item.retailers && item.retailers[0]) || '';
          const price = item.price ? String(item.price) : '';
          const post = item.post_url || item.postUrl || '';
          const notes = item.notes || '';

          const card = document.createElement('article');
          card.className = 'card';

          card.innerHTML = `
            ${img ? `<div class="thumb"><img src="${escapeHtml(img)}" alt="${escapeHtml(title)}" loading="lazy"></div>` : ''}
            <div class="content">
              <h2 class="title">${escapeHtml(title)}</h2>
              <div class="meta"><strong>Release:</strong> ${escapeHtml(release)}</div>
              ${retailer ? `<div class="meta"><strong>Retailer:</strong> ${escapeHtml(retailer)}</div>` : ''}
              ${price ? `<div class="meta"><strong>Price:</strong> ${escapeHtml(price)}</div>` : ''}
              ${post ? `<div class="meta"><a href="${escapeHtml(post)}" target="_blank" rel="noopener noreferrer">Instagram post</a></div>` : ''}
              ${notes ? `<p class="notes">${escapeHtml(notes)}</p>` : ''}
            </div>
          `;

          container.appendChild(card);
        });
      }catch(err){
        console.error(err);
        container.textContent = 'Failed to load exclusives.';
      }
    })();
  </script>
</body>
</html>
