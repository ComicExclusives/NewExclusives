<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Upcoming Retailer Exclusive Comics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- External CSS -->
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>

  <h1>Upcoming Retailer Exclusives ✨</h1>
  <div class="updated" id="lastUpdated"></div>

  <!-- Publisher Filters -->
  <div class="filters-group">
    <div class="filters-label">Publisher</div>
    <div class="filters" id="publisherFilters"></div>
  </div>

  <!-- Series Filters -->
  <div class="filters-group">
    <div class="filters-label">Series</div>
    <div class="filters" id="seriesFilters"></div>
  </div>

  <!-- List -->
  <div id="list">Loading…</div>

  <script>
    /* ---------- Utilities ---------- */
    function escapeHtml(v) {
      return String(v ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function getPublisherClass(publisher) {
      if (!publisher) return 'default';
      const n = publisher.toLowerCase();
      if (n.includes('marvel')) return 'marvel';
      if (n.includes('dc')) return 'dc';
      if (n.includes('image')) return 'image';
      if (n.includes('boom')) return 'boom';
      return 'default';
    }

    function getRetailersArray(item) {
      if (Array.isArray(item.retailers)) return item.retailers;
      if (item.retailer) return [item.retailer]; // backward compatibility
      return [];
    }

    function renderRetailers(item) {
      const retailers = getRetailersArray(item);
      if (!retailers.length) return 'Retailer: <strong>Unknown</strong>';

      const html = retailers.map(r => {
        const name = escapeHtml(r.name || 'Unknown');
        if (r.website) {
          return `<a href="${escapeHtml(r.website)}" target="_blank" rel="noopener">${name}</a>`;
        }
        return name;
      }).join(', ');

      return `Retailer${retailers.length > 1 ? 's' : ''}: <strong>${html}</strong>`;
    }

    /* ---------- Image ---------- */
    function renderThumbnail(item) {
      if (!item.image) return '';
      return `
        <div class="thumb">
          <img src="${escapeHtml(item.image)}"
               alt="${escapeHtml(item.title)}"
               loading="lazy" />
        </div>
      `;
    }

    /* ---------- Date handling ---------- */
    function parseReleaseDate(str) {
      const m = String(str ?? '').match(
        /^(\d{4})-(\d{1,2})-(\d{1,2})-(\d{1,2}):(\d{2})(AM|PM)$/
      );
      if (!m) return null;

      let [, y, mo, d, h, mi, p] = m;
      y = +y; mo = +mo - 1; d = +d; h = +h; mi = +mi;

      if (p === 'PM' && h !== 12) h += 12;
      if (p === 'AM' && h === 12) h = 0;

      return new Date(y, mo, d, h, mi, 0);
    }

    function formatReleaseDisplay(str) {
      const d = parseReleaseDate(str);
      if (!d) return 'TBD';
      return d.toLocaleString(undefined, {
        month: 'long',
        day: 'numeric',
        hour: 'numeric',
        minute: '2-digit',
        hour12: true
      });
    }

    function formatCountdown(str) {
      const d = parseReleaseDate(str);
      if (!d) return '';

      const diff = d - new Date();
      if (diff <= 0) return '';

      const mins = Math.floor(diff / 60000);
      const days = Math.floor(mins / 1440);
      const hours = Math.floor((mins % 1440) / 60);
      const minutes = mins % 60;

      if (days === 0 && hours === 0) return `Releasing in ${minutes} min ⚡`;
      if (days === 0) return `Releasing in ${hours}h ${minutes}m`;
      return `Releasing in ${days}d ${hours}h`;
    }

    /* ---------- State ---------- */
    let allExclusives = [];
    let activePublisher = 'all';
    let activeSeries = 'all';

    /* ---------- Filters ---------- */
    function unique(list) {
      return [...new Set(list.filter(Boolean))].sort();
    }

    function buildPublisherFilters() {
      const el = document.getElementById('publisherFilters');
      el.innerHTML = '';

      const make = (label, value, cls) => {
        const d = document.createElement('div');
        d.className = `filter-pill ${cls} publisher-pill${activePublisher === value ? ' active' : ''}`;
        d.textContent = label;
        d.onclick = () => setFilter('publisher', value);
        el.appendChild(d);
      };

      make('All', 'all', 'default');
      unique(allExclusives.map(e => e.publisher))
        .forEach(p => make(p, p, getPublisherClass(p)));
    }

    function buildSeriesFilters() {
      const el = document.getElementById('seriesFilters');
      el.innerHTML = '';

      const base = activePublisher === 'all'
        ? allExclusives
        : allExclusives.filter(e => e.publisher === activePublisher);

      const series = unique(base.map(e => e.series));
      if (activeSeries !== 'all' && !series.includes(activeSeries)) {
        activeSeries = 'all';
      }

      const make = (label, value) => {
        const d = document.createElement('div');
        d.className = `filter-pill default series-pill${activeSeries === value ? ' active' : ''}`;
        d.textContent = label;
        d.onclick = () => setFilter('series', value);
        el.appendChild(d);
      };

      make('All', 'all');
      series.forEach(s => make(s, s));
    }

    function setFilter(type, value) {
      if (type === 'publisher') activePublisher = value;
      if (type === 'series') activeSeries = value;
      buildPublisherFilters();
      buildSeriesFilters();
      renderList();
    }

    /* ---------- Render ---------- */
    function renderList() {
      const list = document.getElementById('list');
      list.innerHTML = '';

      const filtered = allExclusives.filter(e =>
        (activePublisher === 'all' || e.publisher === activePublisher) &&
        (activeSeries === 'all' || e.series === activeSeries)
      );

      if (!filtered.length) {
        list.textContent = 'No exclusives match these filters.';
        return;
      }

      filtered.forEach(item => {
        const div = document.createElement('div');
        div.className = 'exclusive';

        const countdown = formatCountdown(item.releaseDate);

        div.innerHTML = `
          <div class="card">
            ${renderThumbnail(item)}
            <div class="card-content">
              <div class="title">
                ${escapeHtml(item.title)} ${item.coverArtist ? ' — Cover by ' + escapeHtml(item.coverArtist) : ''}
                <span class="badge ${getPublisherClass(item.publisher)}">
                  ${escapeHtml(item.publisher)}
                </span>
              </div>

              <div class="meta">
                Release: ${escapeHtml(formatReleaseDisplay(item.releaseDate))}
              </div>

              ${countdown ? `<div class="meta countdown">${escapeHtml(countdown)}</div>` : ''}

              <div class="retailer">
                ${renderRetailers(item)}
              </div>

              ${item.notes ? `<div class="meta">Notes: ${escapeHtml(item.notes)}</div>` : ''}
            </div>
          </div>
        `;

        list.appendChild(div);
      });
    }

    /* ---------- Load ---------- */
    fetch('./data/exclusives.json')
      .then(r => r.json())
      .then(data => {
        document.getElementById('lastUpdated').textContent =
          `Last updated: ${data.meta?.lastUpdated ?? ''}`;

        allExclusives = (data.exclusives ?? []).sort((a, b) => {
          const da = parseReleaseDate(a.releaseDate);
          const db = parseReleaseDate(b.releaseDate);
          if (!da && !db) return 0;
          if (!da) return 1;
          if (!db) return -1;
          return da - db;
        });

        buildPublisherFilters();
        buildSeriesFilters();
        renderList();
      })
      .catch(() => {
        document.getElementById('list').textContent = 'Failed to load exclusives.';
      });

    setInterval(renderList, 60000);
  </script>

</body>
</html>
